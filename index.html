<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabla Periódica Interactiva</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scrollbar-gutter: stable; }
      html, body { margin: 0; padding: 0; background: #0a0e1a; overflow-x: hidden; }
      .pt-scroll { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,0.2) transparent; }
      .pt-scroll::-webkit-scrollbar { height: 2px; }
      .pt-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 1px; }
      .pt-scroll::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
